    episodic_to_semantic_fit: 5
    repro_difficulty: 3
    mlrc_eligibility: "yes - NeurIPS 2025 main track"
    risks: "Clustering thresholds can be sensitive; need to confirm seeds and hyperparameter grid"
    notes: "Highest direct fit (schema induction = episodic-to-semantic). Cognitive-science framing aligns with user interest."
    verified_on: ""

