    code_license: ""
    project_page: "https://neurips.cc/virtual/2025/poster/119474"
    tldr: "Constructivist (Piaget-inspired) memory: structured schemata + flexible assimilation + dynamic accommodation via incremental overlapping clustering."
    method_summary: "Incremental overlapping clustering builds hierarchical schemata over a long document. Supports coherent hierarchical summarization and online batch integration. At inference, adaptively explores the schema to activate query-relevant slices, mirroring human associative recall."
    central_claim: "Dual advantages in performance and efficiency on long-text QA, query-based summarization, and claim verification vs flat-memory baselines."
    headline_metric: "Performance + efficiency gains on QA / summarization / claim verification (specific numbers in arXiv 2510.05520 tables)"
    datasets: "Long-text QA, summarization, claim-verification benchmarks (specifics in paper)"
    backbone_models: "LLM-agnostic; configurable in repo's main script"
