# Candidate papers for repro-track / MLRC 2026 reproduction target
# Topic: how semantic knowledge is generated from episodic memory in LLM agents
# Filter: every entry must have a public, reproducible GitHub repository.
# Venue priority: NeurIPS 2025 first, then ICLR/ICML/ACL/EMNLP/IJCAI, then arXiv as last resort.
# main_track: true => accepted to main conference proceedings (clear MLRC eligibility).
# main_track: false => workshop, arXiv-only, or unconfirmed acceptance (eligibility risk).
# Each entry maps 1:1 to a row in candidates.xlsx; xlsx is regenerated by scripts/build_candidates_xlsx.py.

candidates:

  # ========== MAIN TRACK (clear MLRC eligibility) ==========

  # ---------- NeurIPS 2025 (main) ----------

  - id: a-mem
    title: "A-Mem: Agentic Memory for LLM Agents"
    authors: "Wujiang Xu, Zujie Liang, Kai Mei, Hang Gao, Juntao Tan, Yongfeng Zhang"
    venue: "NeurIPS 2025 (main, poster)"
    main_track: true
    year: 2025
    doi: ""
    arxiv_id: "2502.12110"
    openreview_url: "https://openreview.net/forum?id=FiM0M8gcct"
    code_url: "https://github.com/WujiangXu/A-mem"
    code_license: "Apache-2.0 (verify on repo)"
    project_page: "https://neurips.cc/virtual/2025/poster/119020"
    tldr: "Zettelkasten-inspired dynamic memory: each new memory becomes a structured note linked into an evolving knowledge network."
    method_summary: "On each new memory, generates a structured note with contextual description, keywords, and tags. Dynamically links related notes to form a knowledge network and refines them as new info arrives. Treats memory as agentic rather than as a passive store."
    central_claim: "Agentic note-based memory beats SOTA memory baselines (e.g. MemGPT, MemoryBank) across six foundation models on long-horizon agent tasks."
    headline_metric: "Improvements over SOTA memory baselines on LongMemEval-style tasks across 6 backbones (numbers in OpenReview tables)."
    datasets: "LongMemEval; LoCoMo"
    backbone_models: "Six foundation models including GPT-4o-mini, Llama-3, Qwen-2.5 family"
    compute_reported: "Inference-time only; per-call cost dominated by API backbones"
    episodic_to_semantic_fit: 4
    repro_difficulty: 3
    mlrc_eligibility: "yes - NeurIPS 2025 main track"
    risks: "API costs for hosted backbones; six-model ablation grid is large; reliance on commercial GPT-4o-mini for headline numbers"
    notes: "Strong fit, code public, tractable. Likely top contender."
    verified_on: ""

  - id: cam
    title: "CAM: A Constructivist View of Agentic Memory for LLM-Based Reading Comprehension"
    authors: "Rui Li, Zeyu Zhang, Xiaohe Bo, Zihang Tian, Xu Chen, Quanyu Dai, Zhenhua Dong, Ruiming Tang"
    venue: "NeurIPS 2025 (main, poster)"
