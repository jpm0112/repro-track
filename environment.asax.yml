# Conda environment for the ASAX backend (Alabama Supercomputer).
#
# Use (from a login node, after `source reproduction/scripts/env/asax.env`):
#   conda env create -f environment.asax.yml -p $SCRATCH/conda-envs/emllm
#   conda activate $SCRATCH/conda-envs/emllm
#   bash reproduction/scripts/shell/00_env_setup.sh
#
# Differs from environment.local.yml only in the CUDA toolkit version, which
# must match whichever cuda module is loaded by reproduction/scripts/env/asax.env.
# Verify with `module avail cuda` and adjust pytorch-cuda below if needed.

name: emllm
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  # CUDA 11.8 — matches the `cuda/11.8.0` module loaded on Asax. PyTorch 2.3
  # is the last release line shipping pre-built wheels for CUDA 11.8 on the
  # `pytorch` conda channel, so we pin to it here even though local uses 2.3.*
  # already (matched on purpose to keep numerics apples-to-apples).
  - pytorch=2.3.*
  - torchvision=0.18.*
  - torchaudio=2.3.*
  - pytorch-cuda=11.8
  - pip:
      - transformers==4.41.0
      - datasets==2.21.0
      - accelerate>=0.29
      - omegaconf>=2.3
      - fschat>=0.2.35
      - rouge==1.0.1
      - fuzzywuzzy==0.18.0
      - jieba==0.42.1
      - spacy>=3.7,<3.8
      - evaluate
      - rouge_score
      - psutil
      - huggingface_hub>=0.23
      - tqdm
      - python-Levenshtein
